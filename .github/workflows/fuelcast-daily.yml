name: FuelCast Daily

on:
  schedule:
    # 12:00 UTC daily = 5am PDT / 4am PST
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fuelcast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          # Cache by pixi.lock; if lockfile missing, skip cache rather than fail
          cache: ${{ hashFiles('pixi.lock') != '' }}
          # Use frozen if lockfile exists, otherwise let pixi resolve
          frozen: ${{ hashFiles('pixi.lock') != '' }}

      - name: Run FuelCast
        env:
          TP_ICS_URL: ${{ secrets.TP_ICS_URL }}
        run: pixi run fuelcast

      - name: Commit and push if changed
        run: |
          git config user.name "fuelcast-bot"
          git config user.email "fuelcast@brooksgroves.com"
          git add data/today.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "fuelcast: daily plan $(date -u +'%Y-%m-%d')"
            git push
          fi
