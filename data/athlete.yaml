# FuelCast — athlete profile
# Update bodyweight monthly; everything else as it changes.

name: Brooks Groves
location: Lakewood, WA
sex: M
date_of_birth: 1970-05-15
diet: vegetarian              # vegetarian | vegan | omnivore | pescatarian

# Goal mode — drives prescription strategy.
# training_focus = full carbs, protect performance adaptations
# weight_loss    = moderate deficit, protein floor protected, RED days cut
# maintenance    = balanced, no deficit
goal: weight_loss

physical:
  weight_kg: 91               # 200 lbs ≈ 90.7 kg; update monthly
  height_cm: 178
  bodyfat_pct: null           # optional, from DEXA if you have it

training:
  ftp_watts: 210              # current FTP from May 2026 testing
  ftp_w_per_kg: 2.31          # tracked separately; recomputes when weight changes
  swim_css_pace: "1:38/100m"
  run_threshold_pace: "7:30/mile"
  max_hr: null                # field-test with chest strap when ready
  lt1_hr_cap: 130             # working Z2 ceiling; verify via talk test
  power_z2_low: 120           # bottom of Z2 power band
  power_z2_high: 150          # top of Z2 power band (LT1)
  hr_data_source: chest_strap_only   # wrist optical (Fenix 7) is unreliable;
                                     # only HRM Pro chest strap data is trusted
  gut_trained_to_g_hr: 75     # personal carb tolerance ceiling (train upward)

# TrainingPeaks training load seed — calibrated against actual TP display
# May 3, 2026.
# Updated from CSV export ground truth (49 days of TSS data 3/15-5/3) plus
# the gap from training before 3/15 visible in TP's running CTL of 54.
#
# Update these every couple weeks: TP Calendar -> top right shows
# "Today: X CTL · Y ATL · Z TSB" -> copy values + today's date here.
training_load_seed:
  date: 2026-05-03
  ctl: 54                     # TP's current display
  atl: 40                     # gives small negative TSB matching TP ramp rate

# Phase — base, build, peak, race_week, recovery
# Currently in pure Z2 base + fat loss block; mitochondrial development focus.
phase: base

# Race calendar — first race with priority A is "next race"
races:
  - name: "Ironman 70.3 Victoria, BC"
    date: 2027-05-30           # estimated; update when registration confirms
    priority: A
    distance: 70.3
    notes: "primary A-race; ferry from Seattle"

  - name: "Ironman 70.3 Tri-Cities, WA"
    date: 2026-09-20
    priority: B
    distance: 70.3
    notes: "tune-up race / build benchmark"

# Vegetarian-specific supplements
supplements:
  - name: methylcobalamin
    dose: 1000mcg
    daily: true
  - name: vitamin_d3
    dose: 2000IU
    daily: true
  - name: algal_omega3
    dose: 600mg
    daily: false             # set true when you start it

# Site / output
site:
  output_dir: data/
  passphrase_hint: "the lake at the end of the Plain of Six Glaciers"

# TrainingPeaks ICS feed
# URL via TP_ICS_URL environment variable (or GitHub secret).
# Treat the URL like a password.
trainingpeaks:
  ics_url_env: TP_ICS_URL
  lookback_days: 1
  lookahead_days: 7
