[workspace]
name = "fuelcast"
version = "0.1.0"
description = "Periodized vegetarian fueling engine for endurance training"
authors = ["Brooks Groves <brooks@brooksgroves.com>"]
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-arm64"]

[tasks]
fuelcast = "python -m fuelcast.cli"
test = "pytest tests/ -v"
fmt = "ruff format src/ tests/"
lint = "ruff check src/ tests/"

[dependencies]
python = ">=3.12,<3.13"
pyyaml = ">=6.0"
icalendar = ">=5.0"
requests = ">=2.31"
python-dateutil = ">=2.8"
pytz = "*"

[pypi-dependencies]
fuelcast = { path = ".", editable = true }
ruff = ">=0.6"
pytest = ">=8.0"
